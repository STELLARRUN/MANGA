<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Run - Home</title>
<style>
:root { 
    --main-blue: #00ccff; 
    --dark-bg: #0a0a0a; 
    --card-bg: #111;
    --text-color: #ffffff;
    --body-bg: radial-gradient(circle at top, #1a1a1a, #000);
}

/* ألوان الوضع النهاري */
[data-theme="light"] {
    --dark-bg: #f0f2f5;
    --card-bg: #ffffff;
    --text-color: #1a1a1a;
    --body-bg: #f0f2f5;
}

body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--body-bg); color: var(--text-color); min-height: 100vh; overflow-x: hidden; transition: 0.3s; }

/* 1. لودر البداية */
#loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.6s ease; }
.loading-text { font-size: 50px; font-weight: 900; color: var(--main-blue); letter-spacing: 5px; animation: spin 1.2s linear infinite; }
@keyframes spin { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

/* 2. الهيدر */
.header { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: rgba(0, 0, 0, 0.9); border-bottom: 2px solid var(--main-blue); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px); }
.right-side { order: 2; display: flex; align-items: center; gap: 20px; }
.left-side { order: 1; }
.logo-text { font-size: 28px; font-weight: 900; text-decoration: none; }
.stellar { color: var(--text-color); }
.run { color: var(--main-blue); text-shadow: 0 0 10px var(--main-blue); }

/* زرار الثيم الجديد */
.theme-toggle { cursor: pointer; color: var(--text-color); display: flex; align-items: center; transition: 0.3s; }
.theme-toggle:hover { color: var(--main-blue); transform: scale(1.1); }

.x-icon { color: var(--text-color); text-decoration: none; transition: 0.3s; display: flex; align-items: center; }
.x-icon:hover { color: var(--main-blue); transform: scale(1.2); }
.user-circle { width: 45px; height: 45px; border: 2px solid var(--main-blue); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; color: var(--main-blue); transition: 0.4s; }
.user-circle.logged-in { background: var(--main-blue); color: #000; box-shadow: 0 0 20px var(--main-blue); }

/* 3. شريط البحث */
.search-section { padding: 45px 20px; text-align: center; }
#search-bar { 
    width: 90%; max-width: 650px; padding: 18px 30px; border-radius: 40px; border: 2px solid #333; background: var(--card-bg); color: var(--text-color); font-size: 18px; outline: none; transition: 0.5s; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}
#search-bar:focus { border-color: var(--main-blue); box-shadow: 0 0 30px rgba(0, 204, 255, 0.6); transform: scale(1.02); }

/* 4. عناوين الأقسام */
.section-heading { margin: 20px 50px; position: relative; display: inline-block; }
.section-heading h2 { font-size: 24px; margin: 0 0 8px 0; font-weight: 900; }
.section-heading .underline { width: 100%; height: 3px; background: var(--main-blue); box-shadow: 0 0 10px var(--main-blue); }

/* 5. الكروت */
.container { display: flex; flex-wrap: wrap; justify-content: center; gap: 35px; padding: 20px 40px; }
.card { 
    width: 220px; border-radius: 15px; overflow: hidden; background: var(--card-bg); text-decoration: none; color: var(--text-color); border: 1px solid #222; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
}
.card:hover { transform: translateY(-15px) scale(1.05); border-color: var(--main-blue); box-shadow: 0 15px 40px rgba(0, 204, 255, 0.3); }
.card img { width: 100%; height: 320px; object-fit: cover; }
.card-info { padding: 15px; background: linear-gradient(to top, #000, transparent); text-align: center; }
.manga-title { font-size: 18px; font-weight: 900; margin: 0 0 5px 0; }
.rating-container { display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 5px; }
.stars { color: var(--main-blue); font-size: 16px; text-shadow: 0 0 8px var(--main-blue); }
.chapter-num { display: block; font-size: 13px; color: var(--main-blue); background: rgba(0,204,255,0.1); padding: 4px; border-radius: 6px; font-weight: bold; }

/* 6. المودال وقسم المحفوظات */
.modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
.modal-content { background: var(--dark-bg); margin: 5% auto; padding: 35px; border: 2px solid var(--main-blue); width: 90%; max-width: 400px; border-radius: 30px; position: relative; text-align: center; }
.close-btn { position: absolute; top: 20px; left: 25px; color: var(--text-color); font-size: 30px; cursor: pointer; }
.menu-item { background: #161616; padding: 18px; border-radius: 15px; margin-bottom: 12px; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.3s; border: 1px solid #333; }
.menu-item:hover { border-color: var(--main-blue); background: #1a1a1a; transform: translateX(-5px); }

#bookmarksBox { display: none; margin-top: 15px; background: #000; border-radius: 15px; padding: 10px; max-height: 250px; overflow-y: auto; border: 1px solid #222; }
.b-item { display: flex; align-items: center; gap: 12px; text-decoration: none; color: white; padding: 10px; border-bottom: 1px solid #111; text-align: right; }
.b-item:last-child { border: none; }
.b-item img { width: 40px; height: 55px; border-radius: 5px; object-fit: cover; border: 1px solid var(--main-blue); }
.b-item span { font-size: 14px; font-weight: bold; }

.bookmark-icon-custom { fill: #555; transition: 0.3s; }
.menu-item:hover .bookmark-icon-custom { fill: var(--main-blue); filter: drop-shadow(0 0 8px var(--main-blue)); }
.input-field { width: 100%; padding: 14px; margin-bottom: 15px; background: #000; border: 1px solid #333; border-radius: 12px; color: white; outline: none; box-sizing: border-box; }
.main-btn { width: 100%; padding: 15px; background: var(--main-blue); color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; }

@media (max-width: 768px) {
    .container { gap: 20px; padding: 10px 20px; }
    .card { width: 100% !important; max-width: 340px; margin: 0 auto; }
    .header { padding: 10px 15px; }
    .logo-text { font-size: 22px; }
}
</style>
</head>
<body>

<div id="loader"><div class="loading-text">RUN</div></div>

<div class="header">
  <div class="right-side">
    <div class="theme-toggle" onclick="toggleTheme()">
        <svg id="theme-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
    </div>

    <a href="https://x.com/STELLARRUN66" target="_blank" class="x-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
    </a>
    <div id="userIcon" class="user-circle" onclick="toggleUserMenu()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </div>
  </div>
  <div class="left-side"><a href="index.html" class="logo-text"><span class="stellar">STELLAR</span> <span class="run">RUN</span></a></div>
</div>

<div class="search-section">
    <input type="text" id="search-bar" placeholder="ابحث عن المانجا المفضلة لديك..." oninput="filterCards()">
</div>

<div class="section-heading">
    <h2>أحدث الفصول</h2>
    <div class="underline"></div>
</div>
<div class="container" id="latest-chapters-container"></div>

<div class="section-heading">
    <h2>كل المانجا</h2>
    <div class="underline"></div>
</div>
<div class="container" id="all-manga-container">
    <a href="bluelock.html" class="card" data-title="blue lock">
        <img src="bluelock.jpg" alt="Blue Lock">
        <div class="card-info">
            <p class="manga-title">Blue Lock</p>
            <div class="rating-container">
                <span class="stars">★★★★☆</span>
                <span style="color:#888; font-size:14px;">8.1</span>
            </div>
        </div>
    </a>
    <a href="conan.html" class="card" data-title="detective conan">
        <img src="conan.jpg" alt="Detective Conan">
        <div class="card-info">
            <p class="manga-title">Detective Conan</p>
            <div class="rating-container">
                <span class="stars">★★★★☆</span>
                <span style="color:#888; font-size:14px;">8.5</span>
            </div>
        </div>
    </a>
    <a href="sakamoto.html" class="card" data-title="sakamoto days">
        <img src="sakamoto.jpg" alt="Sakamoto Days">
        <div class="card-info">
            <p class="manga-title">Sakamoto Days</p>
            <div class="rating-container">
                <span class="stars">★★★★☆</span>
                <span style="color:#888; font-size:14px;">7.8</span>
            </div>
        </div>
    </a>
</div>

<div id="userModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModals()">&times;</span>
    <div id="authUI">
        <h2 style="color: var(--main-blue); margin-bottom: 25px;">تسجيل الدخول</h2>
        <input type="text" id="regName" class="input-field" placeholder="الاسم (للتسجيل الجديد)">
        <input type="email" id="regEmail" class="input-field" placeholder="البريد الإلكتروني">
        <input type="password" id="regPass" class="input-field" placeholder="كلمة السر">
        <button class="main-btn" onclick="handleAuth()">دخول / تسجيل</button>
    </div>
    <div id="dashboardUI" style="display:none;">
        <h2 id="helloUser" style="color: var(--main-blue); margin-bottom: 20px;">أهلاً</h2>
        <div class="menu-item" onclick="showProfileEdit()"><span>👤 تعديل الملف الشخصي</span></div>
        
        <div class="menu-item" onclick="toggleBookmarksBox()">
            <svg class="bookmark-icon-custom" width="18" height="18" viewBox="0 0 16 16"><path d="M4 1C2.9 1 2 1.9 2 3V15.5L8 11.5L14 15.5V3C14 1.9 13.1 1 12 1H4ZM12 3H4C3.45 3 3 3.45 3 4V13.8L8 10.5L13 13.8V4C13 3.45 12.55 3 12 3Z"/></svg>
            <span>المحفوظات (Bookmark)</span>
        </div>
        <div id="bookmarksBox"></div>

        <div class="menu-item" onclick="logout()" style="margin-top:20px; border-color: #ff4b5c; color: #ff4b5c;"><span>🚪 تسجيل الخروج</span></div>
    </div>
    <div id="editProfileUI" style="display:none;">
        <h2 style="color: var(--main-blue);">تعديل البيانات</h2>
        <input type="text" id="newN" class="input-field"><input type="password" id="newP" class="input-field">
        <button class="main-btn" onclick="saveChanges()">حفظ</button>
        <p onclick="backToDash()" style="color:#555; cursor:pointer; margin-top:15px;">إلغاء</p>
    </div>
  </div>
</div>

<script>
// وظيفة تبديل الثيم
function toggleTheme() {
    const html = document.documentElement;
    const currentTheme = html.getAttribute('data-theme');
    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
    html.setAttribute('data-theme', newTheme);
    
    const icon = document.getElementById('theme-icon');
    if(newTheme === 'light') {
        icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
    } else {
        icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
    }
}

const latestChapters = []; 

function displayLatest() {
    const container = document.getElementById('latest-chapters-container');
    if (latestChapters.length === 0) {
        container.innerHTML = "<p style='color:#444;'>لا توجد فصول محدثة حالياً...</p>";
        return;
    }
    latestChapters.forEach(m => {
        container.innerHTML += `<a href="${m.link}" class="card" data-title="${m.title.toLowerCase()}">
            <img src="${m.img}"><div class="card-info"><p class="manga-title">${m.title}</p>
            <div class="rating-container"><span class="stars">${m.stars}</span></div>
            <span class="chapter-num">${m.chapter}</span></div></a>`;
    });
}

window.onload = () => {
    setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 800);
    displayLatest();
    updateUIState();
};

function toggleUserMenu() { document.getElementById('userModal').style.display = 'block'; updateUIState(); }
function closeModals() { document.getElementById('userModal').style.display = 'none'; }

function updateUIState() {
    const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
    const user = JSON.parse(localStorage.getItem('currentUser'));
    if (isLoggedIn && user) {
        document.getElementById('userIcon').classList.add('logged-in');
        document.getElementById('authUI').style.display = 'none';
        document.getElementById('dashboardUI').style.display = 'block';
        document.getElementById('helloUser').innerText = "أهلاً، " + user.name;
        document.getElementById('newN').value = user.name;
        document.getElementById('newP').value = user.pass;
    }
}

function toggleBookmarksBox() {
    const box = document.getElementById('bookmarksBox');
    const saved = JSON.parse(localStorage.getItem('savedManga')) || [];
    if (box.style.display === 'block') { box.style.display = 'none'; return; }
    if (saved.length === 0) { box.innerHTML = "<p style='color:#555; font-size:12px; padding:10px;'>قائمة المحفوظات فارغة</p>"; } 
    else { box.innerHTML = saved.map(m => `<a href="${m.link}" class="b-item"><img src="${m.img}"><span>${m.title}</span></a>`).join(''); }
    box.style.display = 'block';
}

function handleAuth() {
    const n = document.getElementById('regName').value, e = document.getElementById('regEmail').value, p = document.getElementById('regPass').value;
    if(e && p) {
        let users = JSON.parse(localStorage.getItem('usersList')) || [];
        let u = users.find(x => x.email === e);
        if(u) { if(u.pass === p) { localStorage.setItem('currentUser', JSON.stringify(u)); localStorage.setItem('isLoggedIn', 'true'); } else { alert("خطأ!"); return; }}
        else { if(!n) return; let newUser = {name:n, email:e, pass:p}; users.push(newUser); localStorage.setItem('usersList', JSON.stringify(users)); localStorage.setItem('currentUser', JSON.stringify(newUser)); localStorage.setItem('isLoggedIn', 'true'); }
        location.reload();
    }
}

function logout() { localStorage.removeItem('isLoggedIn'); localStorage.removeItem('currentUser'); location.reload(); }

function filterCards() {
    let q = document.getElementById('search-bar').value.toLowerCase();
    let cards = document.getElementsByClassName('card');
    for (let c of cards) { c.style.display = c.getAttribute('data-title').includes(q) ? "block" : "none"; }
}

function showProfileEdit() { document.getElementById('dashboardUI').style.display = 'none'; document.getElementById('editProfileUI').style.display = 'block'; }
function backToDash() { document.getElementById('editProfileUI').style.display = 'none'; document.getElementById('dashboardUI').style.display = 'block'; }

function saveChanges() {
    let current = JSON.parse(localStorage.getItem('currentUser')), users = JSON.parse(localStorage.getItem('usersList')) || [];
    const n = document.getElementById('newN').value, p = document.getElementById('newP').value;
    users = users.map(u => { if(u.email === current.email) { u.name = n; u.pass = p; current = u; } return u; });
    localStorage.setItem('usersList', JSON.stringify(users)); localStorage.setItem('currentUser', JSON.stringify(current));
    alert("تم التحديث!"); location.reload();
}
</script>
</body>
</html>

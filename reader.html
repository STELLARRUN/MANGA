<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Run - High Res Reader</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .header { 
            width: 100%; 
            padding: 15px 0; 
            background: rgba(17, 17, 17, 0.95); 
            color: #00ccff; 
            text-align: center; 
            border-bottom: 2px solid #00ccff; 
            position: sticky; 
            top: 0; 
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .manga-container { 
            width: 100%; 
            /* شيلنا الـ max-width عشان الصور تاخد راحتها لو شاشتك كبيرة */
            max-width: 1100px; 
            line-height: 0; /* بيمنع الفراغات البيضاء بين الصور */
        }

        .manga-page { 
            width: 100%; 
            height: auto;
            display: block;

            /* --- السحر هنا لمنع بكسلة الصور --- */
            image-rendering: -webkit-optimize-contrast; /* لأجهزة ابل وكرووم */
            image-rendering: crisp-edges;               /* للمتصفحات العادية */
            image-rendering: pixelated;                 /* بيمنع المتصفح إنه يعمل "تنعيم" للصورة فيخليها مغبشة */
            
            /* تفعيل خاصية الـ Hardware Acceleration */
            transform: translateZ(0);
            backface-visibility: hidden;
        }

    </style>
</head>
<body>

    <div class="header">BLUE LOCK - CHAPTER 344 [ULTRA RES]</div>

    <div class="manga-container">
        <img src="https://i.postimg.cc/K4Vc6CMT/10.png" class="manga-page">
        <img src="https://i.postimg.cc/xq7jwBzX/11.png" class="manga-page">
        <img src="https://i.postimg.cc/nMMcwnCt/12.png" class="manga-page">
        <img src="https://i.postimg.cc/VrZsLVZT/13.png" class="manga-page">
        <img src="https://i.postimg.cc/xJpjT4p4/14.png" class="manga-page">
        <img src="https://i.postimg.cc/XGY7WbLx/15.png" class="manga-page">
    </div>

</body>
</html>

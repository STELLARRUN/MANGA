<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Reader - القارئ الذكي</title>
    <style>
        /* --- تنسيقات الهوية (Stellar Style) --- */
        :root {
            --main-blue: #00ccff;
            --dark-bg: #0a0a0a;
            --card-bg: #111;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* شريط التحكم العلوي */
        .reader-controls {
            position: sticky;
            top: 0;
            background: #1a1a1a;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 2px solid var(--main-blue);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .manga-info h2 {
            margin: 0;
            font-size: 18px;
            color: var(--main-blue);
        }

        select, button {
            background: #222;
            color: white;
            border: 1px solid var(--main-blue);
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: var(--main-blue);
            color: black;
        }

        /* منطقة عرض الصور - تحسين الجودة */
        .manga-viewer {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            min-height: 100vh;
        }

        .manga-viewer img {
            width: 100%;
            max-width: 900px;
            display: block;
            margin-bottom: 10px;
            background: #111;
            /* الحفاظ على جودة الصورة الأصلية ومنع التغبيش */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            height: auto;
        }

        /* قسم التعليقات - تحسين الاستجابة للموبايل */
        .comments-section {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 10px;
        }

        textarea {
            width: 100%;
            height: 80px;
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 5px;
            resize: none;
            margin-bottom: 10px;
            box-sizing: border-box; /* لضمان عدم خروج النص عن الإطار في الموبايل */
        }

        .comment-card {
            background: #1a1a1a;
            padding: 15px;
            margin-top: 15px;
            border-right: 4px solid var(--main-blue);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-name {
            color: var(--main-blue);
            font-weight: bold;
            font-size: 14px;
        }

        .comment-text {
            margin: 5px 0 0 0;
            color: #ddd;
            font-size: 15px;
            word-wrap: break-word; /* لمنع تمدد النص الطويل وتخريب التصميم */
        }

        .delete-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }

        /* تنسيقات خاصة للموبايل فقط */
        @media (max-width: 768px) {
            .reader-controls {
                padding: 10px;
            }
            .manga-info h2 { font-size: 14px; }
            .nav-buttons button { padding: 6px 10px; font-size: 12px; }
            
            .comments-section {
                margin: 20px 10px;
                padding: 15px;
            }
            
            .comment-card {
                padding: 12px;
            }
            
            .comments-section button {
                width: 100%; /* زر الإرسال بعرض الشاشة في الموبايل */
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="reader-controls">
        <div class="manga-info">
            <h2 id="mangaTitle">جاري التحميل...</h2>
        </div>
        
        <select id="chapterSelect" onchange="loadNewChapter()">
            </select>
        
        <div class="nav-buttons">
            <button onclick="changeChapter('prev')">السابق</button>
            <button onclick="changeChapter('next')">التالي</button>
        </div>
    </div>

    <div id="mangaViewer" class="manga-viewer">
        </div>

    <div class="comments-section">
        <h3>التعليقات</h3>
        <textarea id="commentText" placeholder="اكتب تعليقك هنا..."></textarea>
        <button onclick="addComment()">نشر التعليق</button>
        <div id="commentsList">
            <p style="color:#666; padding: 20px;">جاري تحميل تعليقات هذا الفصل...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        /* --- إعدادات Firebase الخاصة بك --- */
        const firebaseConfig = {
            apiKey: "AIzaSyBx30dVt4175Hi7WU3Gl6987LY4lj8n048",
            authDomain: "stellar-run-b8b43.firebaseapp.com",
            databaseURL: "https://stellar-run-b8b43-default-rtdb.firebaseio.com",
            projectId: "stellar-run-b8b43",
            storageBucket: "stellar-run-b8b43.firebasestorage.app",
            messagingSenderId: "18726084276",
            appId: "1:18726084276:web:2c1262e4b55810ec77c1e1",
            measurementId: "G-RQZBKCZ6LM"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        /* --- مخزن البيانات اليدوي (للاحتياط) --- */
        const mangaData = {
            "bluelock": { "title": "Blue Lock - بلو لوك", "chapters": { "1": [] } },
            "sakamoto": { "title": "Sakamoto Days - ساكاموتو دايز", "chapters": { "1": [] } },
            "conan": { "title": "Detective Conan - المحقق كونان", "chapters": { "1": [] } }
        };

        const urlParams = new URLSearchParams(window.location.search);
        let currentManga = urlParams.get('manga') || "bluelock";
        let currentChapter = urlParams.get('chapter') || "1";

        // دالة تهيئة القارئ - معدلة لجلب البيانات من Firestore
        async function initReader() {
            // تحديث العنوان
            if (mangaData[currentManga]) {
                document.getElementById('mangaTitle').innerText = mangaData[currentManga].title;
            }

            // محاولة جلب جميع فصول هذه المانجا لتعبئة القائمة
            try {
                const snapshot = await db.collection("manga_data")
                    .where("mangaId", "==", currentManga)
                    .get();
                
                const select = document.getElementById('chapterSelect');
                select.innerHTML = "";
                
                if (!snapshot.empty) {
                    let chaptersFound = [];
                    snapshot.forEach(doc => chaptersFound.push(doc.data().chapterNum));
                    // ترتيب الفصول تصاعدياً
                    chaptersFound.sort((a, b) => a - b);
                    
                    chaptersFound.forEach(ch => {
                        select.innerHTML += `<option value="${ch}" ${ch == currentChapter ? 'selected' : ''}>فصل ${ch}</option>`;
                    });
                } else {
                    select.innerHTML = `<option>لا توجد فصول</option>`;
                }
            } catch (e) { console.log("Error loading chapters list", e); }

            renderImages(); // تحميل صور الفصل الحالي
            loadComments(); // تحميل التعليقات
        }

        // دالة عرض الصور - معدلة لتقرأ من Firestore
        async function renderImages() {
            const viewer = document.getElementById('mangaViewer');
            viewer.innerHTML = "<p style='color:var(--main-blue)'>جاري تحميل الصفحات...</p>";

            try {
                // البحث عن الفصل المحدد في السيرفر
                const docId = `${currentManga}_ch_${currentChapter}`;
                const doc = await db.collection("manga_data").doc(docId).get();

                if (doc.exists) {
                    const data = doc.data();
                    // استخدام loading="eager" للصفحات الأولى لتحسين سرعة ظهور الجودة العالية
                    viewer.innerHTML = data.images.map((img, index) => `<img src="${img}" alt="Page ${index+1}" loading="${index < 2 ? 'eager' : 'lazy'}">`).join('');
                    document.getElementById('mangaTitle').innerText = data.mangaTitle + " - فصل " + currentChapter;
                } else {
                    viewer.innerHTML = "<h2 style='color:white;'>عذراً، هذا الفصل غير متوفر حالياً على السيرفر.</h2>";
                }
            } catch (error) {
                console.error("Error rendering images:", error);
                viewer.innerHTML = "<p>حدث خطأ أثناء تحميل الصور.</p>";
            }
            window.scrollTo(0,0);
        }

        function loadNewChapter() {
            currentChapter = document.getElementById('chapterSelect').value;
            // تحديث الرابط بدون إعادة تحميل الصفحة
            const newurl = window.location.protocol + "//" + window.location.host + window.location.pathname + `?manga=${currentManga}&chapter=${currentChapter}`;
            window.history.pushState({path:newurl},'',newurl);
            
            renderImages();
            loadComments();
        }

        function changeChapter(direction) {
            const select = document.getElementById('chapterSelect');
            if(direction === 'next' && select.selectedIndex < select.length - 1) {
                select.selectedIndex++;
            } else if(direction === 'prev' && select.selectedIndex > 0) {
                select.selectedIndex--;
            }
            loadNewChapter();
        }

        /* --- نظام التعليقات عبر Firebase --- */

        async function addComment() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const userStr = localStorage.getItem('currentUser');
            const userData = userStr ? JSON.parse(userStr) : null;
            const userName = userData ? userData.name : "متابع ستيلار";
            const text = document.getElementById('commentText').value.trim();

            if (!isLoggedIn) {
                alert("سجل دخولك أولاً لتشارك في نقاش هذا الفصل!");
                return;
            }

            if (text === "") return;

            try {
                await db.collection("chapter_comments").add({
                    mangaId: currentManga,
                    chapterId: currentChapter,
                    user: userName,
                    commentText: text,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('commentText').value = "";
            } catch (error) {
                console.error("خطأ في النشر: ", error);
            }
        }

        function loadComments() {
            const list = document.getElementById('commentsList');
            
            db.collection("chapter_comments")
                .where("mangaId", "==", currentManga)
                .where("chapterId", "==", currentChapter)
                .orderBy("createdAt", "desc")
                .onSnapshot((snapshot) => {
                    list.innerHTML = "";
                    if (snapshot.empty) {
                        list.innerHTML = '<p style="color:#666;">لا توجد تعليقات على هذا الفصل، كن أول من يعلق!</p>';
                        return;
                    }
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        list.innerHTML += `
                            <div class="comment-card">
                                <div class="comment-header">
                                    <span class="user-name">${data.user}</span>
                                </div>
                                <p class="comment-text">${data.commentText}</p>
                            </div>`;
                    });
                });
        }

        initReader();
    </script>
</body>
</html>
